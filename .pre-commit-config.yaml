# Pre-commit hooks. Install with:
#   pip install pre-commit
#   pre-commit install
#
# Hooks run on every `git commit`. To run manually against the whole tree:
#   pre-commit run --all-files

repos:
  # Standard hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key

  # Detect leaked secrets / API keys / tokens before they get committed.
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: |
          (?x)^(
            \.secrets\.baseline|
            .*package-lock\.json|
            .*\.lock|
            tests/.*test_.*\.py
          )$

  # Python linting + formatting (lightweight).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
        exclude: ^(alembic/versions/|src/web/)
