name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        # WireGuard userspace tools are needed by parts of the test suite
        # (key derivation, peer config). Public CI doesn't run a kernel
        # WireGuard interface, just the `wg` binary for crypto.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends wireguard-tools

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Extras only the tests need on top of runtime:
          pip install pytest pytest-asyncio pyjwt bcrypt aiocryptopay

      - name: Run pytest
        env:
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          # The public mirror ships gates for paid features; the actual
          # implementations live in the closed-source flirexa-pro package.
          # Tests that depend on those implementations (agent installer,
          # multi-server bootstrap, payment-provider plugins, real
          # CryptoPay/NOWPayments calls) cannot pass here — they're run
          # against flirexa-pro in a separate private CI.
          pytest tests/ \
            --ignore tests/test_payment_flow.py \
            --ignore tests/test_bootstrap.py \
            --ignore tests/test_security_defaults.py \
            --ignore tests/test_restore_cli.py \
            --tb=line -q

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan repository for secrets
        run: |
          # Compare current tree against the committed baseline. Any NEW
          # finding (not already present in .secrets.baseline) fails CI.
          # Existing baseline entries are placeholder DSNs / example creds
          # in docs and i18n strings — false positives the maintainers
          # have reviewed. To accept new false positives, run
          # `detect-secrets scan --baseline .secrets.baseline` locally,
          # commit the updated baseline, and re-push.
          detect-secrets scan \
            --baseline .secrets.baseline \
            --exclude-files '\.lock$|package-lock\.json|node_modules|\.git/' \
            --exclude-files 'tests/.*test_.*\.py' \
            --exclude-files 'src/web/static/dist/.*' \
            --exclude-files 'src/web/(frontend|client-portal)/src/i18n/locales/.*\.js'
          # The above updates .secrets.baseline in place if it diverges.
          # If anything was added, the diff is non-empty.
          if ! git diff --quiet .secrets.baseline; then
            echo "❌ New potential secrets detected — see diff:"
            git --no-pager diff .secrets.baseline | head -200
            exit 1
          fi
          echo "✓ No new secrets detected."
