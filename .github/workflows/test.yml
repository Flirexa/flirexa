name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        # WireGuard userspace tools are needed by parts of the test suite
        # (key derivation, peer config). Public CI doesn't run a kernel
        # WireGuard interface, just the `wg` binary for crypto.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends wireguard-tools

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Extras only the tests need on top of runtime:
          pip install pytest pytest-asyncio pyjwt bcrypt aiocryptopay

      - name: Run pytest
        env:
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          # The public mirror ships gates for paid features; the actual
          # implementations live in the closed-source flirexa-pro package.
          # Tests that depend on those implementations (agent installer,
          # multi-server bootstrap, payment-provider plugins, real
          # CryptoPay/NOWPayments calls) cannot pass here — they're run
          # against flirexa-pro in a separate private CI.
          pytest tests/ \
            --ignore tests/test_payment_flow.py \
            --ignore tests/test_bootstrap.py \
            --ignore tests/test_security_defaults.py \
            --ignore tests/test_restore_cli.py \
            --tb=line -q

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan repository for secrets
        run: |
          # Compare current tree against the committed baseline. Any NEW
          # finding (not already present in .secrets.baseline) fails CI.
          # Existing baseline entries are placeholder DSNs / example creds
          # in docs — false positives reviewed by maintainers. To accept
          # new false positives, run `detect-secrets scan --baseline
          # .secrets.baseline` locally, commit the updated baseline, and
          # re-push.
          cp .secrets.baseline .secrets.baseline.before
          detect-secrets scan \
            --baseline .secrets.baseline \
            --exclude-files '\.lock$|package-lock\.json|node_modules|\.git/' \
            --exclude-files 'tests/.*test_.*\.py' \
            --exclude-files 'src/web/static/dist/.*' \
            --exclude-files 'src/web/(frontend|client-portal)/src/i18n/locales/.*\.js'
          # detect-secrets rewrites the file with bookkeeping (timestamps,
          # filter ordering). What matters is whether `results` grew —
          # i.e. a real new candidate showed up.
          python3 - <<'PY'
          import json, sys
          before = json.load(open(".secrets.baseline.before")).get("results", {})
          after  = json.load(open(".secrets.baseline")).get("results", {})
          # Flatten to (file, hashed_secret) pairs so order doesn't matter.
          def keys(blob):
              s = set()
              for f, items in blob.items():
                  for it in items:
                      s.add((f, it.get("hashed_secret")))
              return s
          new = keys(after) - keys(before)
          if new:
              print(f"❌ {len(new)} NEW candidate secret(s):")
              for f, h in sorted(new):
                  print(f"  {f}  hash={h}")
              sys.exit(1)
          print("✓ No new secrets detected.")
          PY
