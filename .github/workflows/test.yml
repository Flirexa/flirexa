name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Extras only the tests need on top of runtime:
          pip install pytest pytest-asyncio pyjwt bcrypt aiocryptopay

      - name: Run pytest
        env:
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          # tests/test_payment_flow.py and one bootstrap network test depend on
          # real CryptoPay / NOWPayments credentials and a live network reach.
          # They run as a separate (allowed-to-fail) job in CI; the main suite
          # excludes them so a green check means "code is good", not "there's a
          # CryptoPay token in the test runner".
          pytest tests/ \
            --deselect tests/test_bootstrap.py::TestInstallAgentFlow::test_no_internet_returns_clear_error \
            --ignore tests/test_payment_flow.py \
            --tb=line -q

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan repository for secrets
        run: |
          # Audit the working tree. We don't ship a .secrets.baseline yet —
          # CI is allowed to flag any new credentials that slip into a PR.
          detect-secrets scan \
            --exclude-files '\.lock$|package-lock\.json|node_modules|\.git/' \
            --exclude-files 'tests/.*test_.*\.py' \
            --exclude-files 'src/web/static/dist/.*' \
            > /tmp/scan-results.json
          # detect-secrets exits 0 even when it finds something — surface results.
          python -c "import json,sys; d=json.load(open('/tmp/scan-results.json')); r=d.get('results',{}); n=sum(len(v) for v in r.values()); print(f'flagged: {n} potential secret(s) across {len(r)} file(s)'); sys.exit(1 if n else 0)"
