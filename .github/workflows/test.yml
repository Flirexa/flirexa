name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          # Pull only what tests actually need; avoid the heavier optional
          # extras to keep the CI loop fast.
          pip install \
            fastapi httpx loguru sqlalchemy alembic psycopg2-binary \
            pytest pytest-asyncio pyyaml \
            pyjwt 'cryptography>=42' bcrypt

      - name: Run pytest
        env:
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          # The single bootstrap test that hits real network is excluded —
          # this is a known pre-existing failure documented in the repo.
          pytest tests/ \
            --deselect tests/test_bootstrap.py::TestInstallAgentFlow::test_no_internet_returns_clear_error \
            --tb=line -q

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan repository for secrets
        run: |
          # Audit the working tree. We don't ship a .secrets.baseline yet —
          # CI is allowed to flag any new credentials that slip into a PR.
          detect-secrets scan \
            --exclude-files '\.lock$|package-lock\.json|node_modules|\.git/' \
            --exclude-files 'tests/.*test_.*\.py' \
            --base-path .
